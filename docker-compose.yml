version: '3.9'

networks:
  fab-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
  loki-data:

services:

  postgres:
    image: postgres:16
    container_name: fab-postgres
    environment:
      POSTGRES_DB: fabdata
      POSTGRES_USER: fab
      POSTGRES_PASSWORD: fab123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - fab-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fab -d fabdata"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fab-redis
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    networks:
      - fab-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fab-data-backend
    environment:
      SPRING_APPLICATION_NAME: fab-data-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fabdata
      SPRING_DATASOURCE_USERNAME: fab
      SPRING_DATASOURCE_PASSWORD: fab123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JAVA_TOOL_OPTIONS: -javaagent:/app/opentelemetry-javaagent.jar
      OTEL_SERVICE_NAME: fab-data-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_TRACES_SAMPLER: parentbased_always_on
    ports:
      - "8080:8080"
    networks:
      - fab-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fab-data-frontend
    ports:
      - "3000:80"
    networks:
      - fab-net
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: fab-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    networks:
      - fab-net
    depends_on:
      - backend
      - frontend

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: fab-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - fab-net

  loki:
    image: grafana/loki:2.9.0
    container_name: fab-loki
    volumes:
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - fab-net
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:3.0.0
    container_name: fab-promtail
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    networks:
      - fab-net
    depends_on:
      - loki

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: fab-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      JAEGER_DISABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - fab-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:14269/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.4.2
    container_name: fab-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3001:3000"
    networks:
      - fab-net
    depends_on:
      - prometheus
      - loki
      - jaeger
