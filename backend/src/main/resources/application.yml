spring:
  application:
    name: fab-data-service
  datasource:
    url: jdbc:postgresql://postgres:5432/fabdata
    username: fab
    password: fab123
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
  data:
    redis:
      host: redis
      port: 6379
  cache:
    type: redis

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,beans
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://jaeger:4318/v1/traces

server:
  port: 8080
