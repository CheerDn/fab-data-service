apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://{{ .Values.postgres.host }}:{{ .Values.postgres.port }}/{{ .Values.postgres.database }}"
  SPRING_DATASOURCE_USERNAME: "{{ .Values.postgres.username }}"
  SPRING_DATA_REDIS_HOST: "{{ .Values.redis.host }}"
  SPRING_DATA_REDIS_PORT: "{{ .Values.redis.port }}"
  OTEL_EXPORTER_OTLP_ENDPOINT: "{{ .Values.jaeger.endpoint }}"
  OTEL_SERVICE_NAME: "fab-data-backend"
